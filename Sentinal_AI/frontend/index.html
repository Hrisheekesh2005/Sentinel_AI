<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel AI | Agentic Safety Shield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Syne', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }

    /* Waveform bars */
    .bar {
      width: 5px;
      height: 20px;
      background: #818cf8;
      border-radius: 3px;
      animation: wave 1s infinite ease-in-out;
    }
    .bar:nth-child(2)  { animation-delay: 0.1s; }
    .bar:nth-child(3)  { animation-delay: 0.2s; }
    .bar:nth-child(4)  { animation-delay: 0.3s; }
    .bar:nth-child(5)  { animation-delay: 0.4s; }
    .bar:nth-child(6)  { animation-delay: 0.5s; }
    .bar:nth-child(7)  { animation-delay: 0.6s; }
    .bar:nth-child(8)  { animation-delay: 0.7s; }
    .bar:nth-child(9)  { animation-delay: 0.8s; }
    .bar:nth-child(10) { animation-delay: 0.9s; }

    @keyframes wave {
      0%, 100% { height: 12px; }
      50%       { height: 55px; }
    }

    /* Monologue typewriter blink */
    .cursor::after {
      content: '▌';
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Arc transition */
    #riskArc { transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1), stroke 0.6s; }

    /* Pulse on scam badge */
    @keyframes pulseRed {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50%       { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
    }
    .pulse-red { animation: pulseRed 1.6s infinite; }

    /* Slide in */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slideUp 0.45s ease both; }
  </style>
</head>

<body class="bg-slate-950 min-h-screen text-white">
<div class="max-w-3xl mx-auto py-14 px-4">

  <!-- ─── HEADER ─── -->
  <div class="text-center mb-12">
    <div class="inline-flex items-center gap-3 mb-3">
      <span class="text-4xl">🛡</span>
      <h1 class="text-4xl font-extrabold tracking-tight text-white">Sentinel AI</h1>
    </div>
    <p class="mono text-indigo-400 text-sm tracking-widest uppercase">Agentic Digital Safety Shield</p>
  </div>

  <!-- ─── INPUT CARD ─── -->
  <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl shadow-2xl mb-8">
    <textarea
      id="messageInput"
      class="w-full mono p-4 bg-slate-800 border border-slate-600 rounded-2xl text-sm text-slate-100 placeholder-slate-500 focus:border-indigo-500 outline-none resize-none"
      rows="5"
      placeholder="Paste suspicious WhatsApp / SMS message here..."></textarea>

    <p id="voiceText" class="mono text-xs text-indigo-400 mt-2 italic min-h-[1.2rem]"></p>

    <!-- Waveform -->
    <div id="voiceWave" class="hidden flex justify-center items-end mt-3 space-x-1 h-16">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="mt-5 flex gap-3">
      <!-- Voice Button -->
      <button onclick="startVoiceInput()"
        class="flex-1 bg-indigo-700 hover:bg-indigo-600 text-white py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition">
        <i class="fa-solid fa-microphone"></i> Speak Message
      </button>

      <!-- Analyze Button -->
      <button onclick="runAgenticAnalysis()" id="analyzeBtn"
        class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition">
        <i class="fa-solid fa-robot"></i>
        <span id="btnText">ACTIVATE AI AGENT</span>
      </button>
    </div>
  </div>

  <!-- ─── AGENT MONOLOGUE ─── -->
  <div id="monologueBox" class="hidden mb-6 bg-slate-900 border border-indigo-900 rounded-2xl p-5 shadow-inner slide-up">
    <p class="mono text-indigo-500 text-xs uppercase tracking-widest mb-3">⚙ Agent Internal Monologue</p>
    <div id="monologueText" class="mono text-sm text-slate-300 leading-relaxed cursor"></div>
  </div>

  <!-- ─── DASHBOARD ─── -->
  <div id="dashboard" class="hidden space-y-5">

    <!-- RISK GAUGE CARD -->
    <div class="bg-slate-900 border border-slate-700 p-7 rounded-3xl shadow-xl text-center slide-up">
      <p class="mono text-xs uppercase tracking-widest text-slate-500 mb-5">AI Risk Assessment</p>

      <!-- Speedometer Arc -->
      <div class="flex flex-col items-center">
        <svg width="220" height="120" viewBox="0 0 220 120">
          <!-- Background track -->
          <path d="M10 110 A100 100 0 0 1 210 110"
            fill="none" stroke="#1e293b" stroke-width="14" stroke-linecap="round"/>
          <!-- Colored arc -->
          <path id="riskArc"
            d="M10 110 A100 100 0 0 1 210 110"
            fill="none" stroke="#22c55e" stroke-width="14"
            stroke-dasharray="314" stroke-dashoffset="314"
            stroke-linecap="round"/>
        </svg>
        <div id="riskScore" class="text-5xl font-extrabold text-white -mt-14 mb-2">0%</div>
        <div id="riskBadge" class="px-5 py-1 rounded-full mono text-xs font-bold uppercase tracking-widest border">SAFE</div>
      </div>

      <!-- Reasoning -->
      <ul id="reasoningList" class="mt-6 space-y-2 text-sm text-slate-400 italic text-left"></ul>
    </div>

    <!-- ENTITY INFO BAR -->
    <div class="bg-slate-900 border border-slate-700 p-5 rounded-2xl flex flex-col md:flex-row justify-between gap-4 mono slide-up">
      <div>
        <p class="text-xs text-slate-500 uppercase mb-1">📱 Phone</p>
        <p id="extPhone" class="text-blue-400 text-sm">None Detected</p>
      </div>
      <div class="hidden md:block w-px bg-slate-700"></div>
      <div>
        <p class="text-xs text-slate-500 uppercase mb-1">💳 UPI</p>
        <p id="extUpi" class="text-amber-400 text-sm">None Detected</p>
      </div>
      <div class="hidden md:block w-px bg-slate-700"></div>
      <div>
        <p class="text-xs text-slate-500 uppercase mb-1">🔗 Link</p>
        <p id="extLink" class="text-emerald-400 text-sm break-all">None Detected</p>
      </div>
    </div>

    <!-- SCAM PROMPT -->
    <div id="scamPrompt" class="hidden bg-red-950 border-2 border-red-600 p-8 rounded-3xl text-center shadow-2xl pulse-red slide-up">
      <i class="fa-solid fa-circle-exclamation text-red-400 text-5xl mb-4"></i>
      <p class="text-red-300 font-extrabold text-xl mb-1">⚠ THIS IS A SCAM MESSAGE</p>
      <p class="text-red-400 text-sm mb-6">Do you want me to draft a cybercrime complaint?</p>
      <div class="flex flex-wrap justify-center gap-3">
        <button onclick="ignoreScam()"
          class="px-6 py-2 bg-slate-800 text-slate-300 rounded-xl font-bold text-sm hover:bg-slate-700 transition">
          Ignore
        </button>
        <button onclick="downloadComplaintPDF()"
          class="px-6 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold text-sm transition">
          <i class="fa-solid fa-file-pdf mr-1"></i> Draft PDF
        </button>
        <button onclick="draftComplaintEmail()"
          class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-sm transition">
          <i class="fa-solid fa-envelope mr-1"></i> Email Complaint
        </button>
      </div>
    </div>

    <!-- ACTION TOOLS -->
    <div id="actionSection" class="hidden space-y-3 slide-up">
      <button onclick="verifyNews()"
        class="w-full bg-slate-900 border border-slate-700 hover:border-blue-500 text-left p-5 rounded-2xl flex items-center gap-4 transition group">
        <i class="fa-solid fa-magnifying-glass text-blue-400 text-2xl group-hover:scale-110 transition"></i>
        <div>
          <p class="font-bold text-white">Search for Truth — Fact Check</p>
          <p class="text-xs text-slate-500 italic mt-0.5">Cross-verify this claim on official sources</p>
        </div>
      </button>

      <button onclick="warnOnWhatsApp()"
        class="w-full bg-slate-900 border border-slate-700 hover:border-green-500 text-left p-5 rounded-2xl flex items-center gap-4 transition group">
        <i class="fa-brands fa-whatsapp text-green-400 text-3xl group-hover:scale-110 transition"></i>
        <div>
          <p class="font-bold text-white">Protect Community — WhatsApp Alert</p>
          <p class="text-xs text-slate-500 italic mt-0.5">Forward AI safety alert to warn others</p>
        </div>
      </button>
    </div>

  </div><!-- /dashboard -->
</div><!-- /container -->

<script>
let currentReport = null;
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ── VOICE INPUT ── */
function startVoiceInput() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Voice recognition not supported in this browser."); return; }

  const recognition = new SR();
  recognition.lang = "en-US";
  recognition.start();

  document.getElementById("voiceWave").classList.remove("hidden");

  recognition.onresult = function (event) {
    const text = event.results[0][0].transcript;
    document.getElementById("voiceWave").classList.add("hidden");
    document.getElementById("messageInput").value = text;
    document.getElementById("voiceText").innerText = "🎙 Detected: " + text;
    runAgenticAnalysis();
  };

  recognition.onerror = function () {
    document.getElementById("voiceWave").classList.add("hidden");
    alert("Voice recognition error. Please try again.");
  };
}

/* ── MAIN ANALYSIS ── */
async function runAgenticAnalysis() {
  const text = document.getElementById("messageInput").value.trim();
  if (!text) { alert("Please enter or speak a message."); return; }

  // Reset
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("scamPrompt").classList.add("hidden");
  document.getElementById("actionSection").classList.add("hidden");
  document.getElementById("monologueBox").classList.remove("hidden");
  document.getElementById("btnText").innerText = "AGENT IS REASONING...";
  document.getElementById("analyzeBtn").disabled = true;

  const mText = document.getElementById("monologueText");
  mText.innerHTML = "";

  const steps = [
    "🔍 [OBSERVE] Scanning linguistic patterns...",
    "🧠 [THINK]   Running ML classifier...",
    "📜 [REASON]  Applying rule-based scoring...",
    "🌐 [ACT]     Extracting hidden entities..."
  ];

  for (let step of steps) {
    mText.innerHTML += `> ${step}<br>`;
    await sleep(600);
  }

  try {
    const response = await fetch("https://surakshalensai.onrender.com/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const result = await response.json();

    currentReport = {
      score: Math.min(result.risk_score, 99),
      label: result.decision,
      reasons: result.reasons,
      dynamic_complaint: result.dynamic_complaint || null,
      phone: extractPhone(text),
      upi: extractUPI(text),
      link: extractLink(text),
      fullText: text
    };

    mText.innerHTML += `<span class="text-green-400">> ✅ Analysis Complete — rendering report...</span>`;
    await sleep(400);

    updateUI();

  } catch (err) {
    mText.innerHTML += `<span class="text-red-400">> ❌ Could not reach backend. Check connection.</span>`;
  } finally {
    document.getElementById("btnText").innerText = "ACTIVATE AI AGENT";
    document.getElementById("analyzeBtn").disabled = false;
  }
}

/* ── ENTITY EXTRACTION ── */
function extractPhone(text) {
  return text.match(/(\+91[\-\s]?)?[6789]\d{9}/g)?.[0] || "None Detected";
}
function extractUPI(text) {
  return text.match(/[a-zA-Z0-9.\-_]{2,256}@[a-zA-Z]{2,64}/g)?.[0] || "None Detected";
}
function extractLink(text) {
  return text.match(/https?:\/\/[^\s]+/g)?.[0] || "None Detected";
}

/* ── UPDATE UI ── */
function updateUI() {
  const { score, label, reasons, phone, upi, link } = currentReport;

  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("riskScore").innerText = score + "%";
  document.getElementById("riskBadge").innerText = label;
  document.getElementById("extPhone").innerText = phone;
  document.getElementById("extUpi").innerText = upi;
  document.getElementById("extLink").innerText = link;
  document.getElementById("reasoningList").innerHTML =
    reasons.map(r => `<li>• ${r}</li>`).join("");

  // Arc speedometer
  const arc = document.getElementById("riskArc");
  const offset = 314 - (314 * score / 100);
  arc.style.strokeDashoffset = offset;

  const badge = document.getElementById("riskBadge");
  const scamPrompt = document.getElementById("scamPrompt");
  const actionSection = document.getElementById("actionSection");

  if (label === "SCAM") {
    arc.style.stroke = "#ef4444";
    badge.className = "px-5 py-1 rounded-full mono text-xs font-bold uppercase tracking-widest border bg-red-900 text-red-300 border-red-600";
    scamPrompt.classList.remove("hidden");
    actionSection.classList.remove("hidden");
  } else if (label === "SUSPICIOUS") {
    arc.style.stroke = "#f59e0b";
    badge.className = "px-5 py-1 rounded-full mono text-xs font-bold uppercase tracking-widest border bg-amber-900 text-amber-300 border-amber-600";
    scamPrompt.classList.add("hidden");
    actionSection.classList.remove("hidden");
  } else {
    arc.style.stroke = "#22c55e";
    badge.className = "px-5 py-1 rounded-full mono text-xs font-bold uppercase tracking-widest border bg-green-900 text-green-300 border-green-700";
    scamPrompt.classList.add("hidden");
    actionSection.classList.add("hidden");
  }
}

/* ── ACTIONS ── */
function verifyNews() {
  const query = encodeURIComponent(currentReport.fullText.substring(0, 150));
  window.open(`https://www.google.com/search?q=${query}+fact+check`, "_blank");
}

function ignoreScam() {
  document.getElementById("scamPrompt").innerHTML =
    "<p class='text-slate-500 mono text-sm py-4'>⚠ Warning dismissed. Stay vigilant.</p>";
}

function downloadComplaintPDF() {
  if (!currentReport || !currentReport.dynamic_complaint) {
    return alert("No complaint data available from the backend.");
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFillColor(15, 23, 42);
  doc.rect(0, 0, 210, 40, 'F');
  doc.setFontSize(18);
  doc.setTextColor(255, 255, 255);
  doc.text("Sentinel AI — Incident Report", 20, 26);

  doc.setFontSize(10);
  doc.setTextColor(30, 30, 30);
  const splitText = doc.splitTextToSize(currentReport.dynamic_complaint, 170);
  doc.text(splitText, 20, 55);
  doc.save(`SentinelAI_Report_${Date.now()}.pdf`);
}

function draftComplaintEmail() {
  const { label, score, phone, upi, link, fullText } = currentReport;
  const subject = encodeURIComponent(`Cybercrime Complaint — ${label}`);
  const body = encodeURIComponent(
`Dear Cybercrime Team,

This message was flagged by Sentinel AI.

Verdict      : ${label}
Risk Score   : ${score}%

Detected Phone : ${phone}
Detected UPI   : ${upi}
Detected Link  : ${link}

Original Message:
${fullText}

Kindly investigate this issue.

Regards`
  );
  window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=complaint@cybercrime.gov.in&su=${subject}&body=${body}`, '_blank');
}

function warnOnWhatsApp() {
  const { label, score, phone, upi, link } = currentReport;
  const msg =
`🛡 SENTINEL AI ALERT

Verdict    : ${label}
Risk Score : ${score}%

📱 Phone : ${phone}
💳 UPI   : ${upi}
🔗 Link  : ${link}

⚠ Do NOT share OTP or click unknown links.
Stay safe — Sentinel AI`;

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}
</script>
</body>
</html>
